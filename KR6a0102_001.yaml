body:
  text: 大唐三藏法師義淨奉制譯如是我聞一時薄伽梵在婆羅痆斯仙人墮處施鹿林中爾時世尊告五苾芻曰汝等當知色不是我若是我者色不應病及受苦惱我欲如是色我不欲如是色既不如是隨情所欲是故當知色不是我受想行識亦復如是復次苾芻於汝意云何色為是常為是無常白言大德色是無常佛言色既無常此即是苦或苦苦壞苦行苦然我聲聞多聞弟子執有我不色即是我我有諸色色屬於我我在色中不不爾世尊應知受想行識常與無常亦復如是凡所有色若過去未來現在內外麁細若勝若劣若遠若近悉皆無我汝等當知應以正智而善觀察如是所有受想行識過去未來現在悉應如前正智觀察若我聲聞聖弟子衆觀此五取蘊知無有我及以我所如是觀已即知世間無能取所取亦非轉變但由自悟而證涅槃我生已盡梵行已立所作已辦不受後有説此法時五苾芻等於諸煩惱心得解脫信受奉行
